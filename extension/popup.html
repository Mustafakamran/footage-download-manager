<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FDM Downloader</title>
    <style>
      /* FDM dark theme tokens (hardcoded — extension can't read app CSS vars). */
      :root {
        --bg: #000000;
        --surface: #0e0e10;
        --card: #161618;
        --hover: #1f1f22;
        --border: #262629;
        --border-strong: #38383c;
        --text: #f4f4f6;
        --text-2: #a0a0a6;
        --text-3: #66666d;
        --accent: #ffffff;
        --accent-ink: #000000;
        --ok: #3fb950;
        --warn: #d29922;
        --fail: #f85149;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        width: 320px;
      }
      .wrap { padding: 14px 14px 16px; }
      header {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 12px;
      }
      header .logo {
        width: 28px; height: 28px;
        border-radius: 8px;
        background: var(--accent);
        color: var(--accent-ink);
        display: grid; place-items: center;
        font-size: 15px;
        border: 1px solid var(--border-strong);
      }
      header h1 { font-size: 14px; margin: 0; font-weight: 700; color: var(--text); }
      header .sub { font-size: 11px; color: var(--text-2); margin-top: 1px; }

      label {
        display: block;
        font-size: 11px;
        color: var(--text-3);
        margin: 12px 0 4px;
        text-transform: uppercase;
        letter-spacing: .04em;
      }
      input[type="text"], input[type="password"], input[type="number"] {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        padding: 8px 9px;
        font: inherit;
        outline: none;
        transition: border-color .12s ease;
      }
      input::placeholder { color: var(--text-3); }
      input:focus { border-color: var(--border-strong); }
      .row { display: flex; gap: 8px; }
      .row > .grow { flex: 1; }
      .row > .port { width: 92px; }

      /* Primary button: light accent fill with dark ink. */
      button {
        font: inherit;
        font-weight: 600;
        color: var(--accent-ink);
        background: var(--accent);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        padding: 9px 12px;
        cursor: pointer;
        transition: opacity .12s ease, transform .05s ease;
      }
      button:hover { opacity: .88; }
      button:active { transform: translateY(1px); }
      /* Secondary button: dark card surface with light text. */
      button.secondary {
        background: var(--card);
        color: var(--text);
        border-color: var(--border);
      }
      button.secondary:hover { background: var(--hover); opacity: 1; }
      .actions { display: flex; gap: 8px; margin-top: 14px; }
      .actions button { flex: 1; }

      .status {
        margin-top: 12px;
        font-size: 12px;
        padding: 9px 10px;
        border-radius: 8px;
        background: var(--card);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 36px;
      }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text-3); flex: none; }
      .status.ok   { border-color: rgba(63,185,80,.5); }
      .status.ok   .dot { background: var(--ok); }
      .status.fail { border-color: rgba(248,81,73,.5); }
      .status.fail .dot { background: var(--fail); }
      .status .msg { line-height: 1.35; color: var(--text); }

      .hint {
        margin-top: 12px;
        font-size: 11px;
        color: var(--text-2);
        line-height: 1.5;
      }
      .hint code {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1px 5px;
        font-size: 11px;
        color: var(--text);
      }
      .hint strong { color: var(--text); }
      /* Small icon button (reveal token). */
      .iconbtn {
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 8px;
        padding: 0 10px;
        cursor: pointer;
        font-weight: 600;
        transition: background .12s ease;
      }
      .iconbtn:hover { background: var(--hover); opacity: 1; }

      /* Toggle row for "Intercept browser downloads". */
      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 14px;
        padding: 10px 11px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .toggle .t-text { line-height: 1.3; }
      .toggle .t-title { font-size: 12px; font-weight: 600; color: var(--text); }
      .toggle .t-sub { font-size: 11px; color: var(--text-2); margin-top: 2px; }
      .switch { position: relative; width: 40px; height: 22px; flex: none; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .switch .slider {
        position: absolute;
        inset: 0;
        background: var(--surface);
        border: 1px solid var(--border-strong);
        border-radius: 999px;
        cursor: pointer;
        transition: background .15s ease, border-color .15s ease;
      }
      .switch .slider::before {
        content: "";
        position: absolute;
        height: 16px; width: 16px;
        left: 2px; top: 2px;
        background: var(--text-3);
        border-radius: 50%;
        transition: transform .15s ease, background .15s ease;
      }
      .switch input:checked + .slider {
        background: var(--accent);
        border-color: var(--accent);
      }
      .switch input:checked + .slider::before {
        transform: translateX(18px);
        background: var(--accent-ink);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="logo">⬇</div>
        <div>
          <h1>FDM Downloader</h1>
          <div class="sub">Send links straight to the FDM app</div>
        </div>
      </header>

      <label for="token">Pairing token</label>
      <div class="row">
        <input
          id="token"
          class="grow"
          type="password"
          autocomplete="off"
          spellcheck="false"
          placeholder="Paste from FDM Settings → Browser extension"
        />
        <button id="reveal" class="iconbtn" type="button" title="Show / hide">👁</button>
      </div>

      <label for="port">Port</label>
      <div class="row">
        <input id="port" class="port" type="number" min="1" max="65535" value="53713" />
        <button id="save" class="grow" type="button">Save</button>
      </div>

      <div class="actions">
        <button id="test" type="button">Test connection</button>
      </div>

      <div class="toggle">
        <div class="t-text">
          <div class="t-title">Intercept browser downloads</div>
          <div class="t-sub">Hand new downloads to FDM (when FDM is running).</div>
        </div>
        <label class="switch" title="Intercept browser downloads">
          <input id="intercept" type="checkbox" checked />
          <span class="slider"></span>
        </label>
      </div>

      <div id="status" class="status">
        <span class="dot"></span>
        <span class="msg">Not tested yet.</span>
      </div>

      <div class="hint">
        In FDM, open <code>Settings → Browser extension</code>, copy the token,
        paste it above and click <strong>Save</strong>. Then
        <strong>Test connection</strong> to confirm FDM is running.
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
