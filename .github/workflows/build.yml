name: build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Needed so tauri-action can create the GitHub Release (publish installers + latest.json).
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
            rust-target: "aarch64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch the rclone sidecar for this OS
        run: npm run fetch:rclone

      - name: Build the app (and publish on tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater (OTA) signing — add these as GitHub Actions repo secrets.
          # TAURI_SIGNING_PRIVATE_KEY is the contents of .tauri/signing.key
          # (never committed); the password is empty (key generated without one).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "FDM ${{ github.ref_name }}"
          # Must be published (not a draft) so the updater endpoint
          # /releases/latest/download/latest.json resolves.
          releaseDraft: false
          # Emit + attach latest.json so installed apps can self-update.
          includeUpdaterJson: true
          args: ${{ matrix.args }}
